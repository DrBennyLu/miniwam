# Single-task full WAM (task_index=2, cream cheese)
# D2: 先跑 2000 step 确认无 NaN，再 --resume 到 20k
defaults:
  - default

data:
  task_indices: [2]
  image_size: 128
  use_wrist: false
  action_horizon: 16
  video_frames: 5

model:
  hidden_dim: 384
  num_layers: 6
  num_heads: 6
  lambda_vid: 1.0
  train_video: true
  train_action: true

training:
  mode: full
  batch_size: 4
  gradient_accumulation: 2
  bf16: true
  max_steps: 2000
  save_every: 500
  log_every: 20
  save_dir: ./checkpoints/libero_object_task2
  log_dir: ./logs/libero_object_task2

eval:
  task_id: 2
  num_trials: 10
  chunk_execute: 8
